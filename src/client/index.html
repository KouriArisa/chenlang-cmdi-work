<!doctype html>
<!-- 备注：对应培训阶段 3（核心功能编码），关联设计文档第 4 节“技术选型”和第 5 节“前端模块”。 -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Sprint</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">26AI 培训作业示例</p>
          <h1>Snake Sprint</h1>
          <p class="hero-copy">一个带排行榜 API 的贪吃蛇小游戏，包含完整工程化交付物。</p>
        </div>
        <div class="hero-stats">
          <article class="stat-card">
            <span>状态</span>
            <strong id="game-status">待机</strong>
          </article>
          <article class="stat-card">
            <span>分数</span>
            <strong id="game-score">0</strong>
          </article>
          <article class="stat-card">
            <span>等级</span>
            <strong id="game-level">1</strong>
          </article>
          <article class="stat-card">
            <span>最佳</span>
            <strong id="best-score">0</strong>
          </article>
        </div>
      </header>

      <main class="layout">
        <section class="board-panel">
          <canvas id="game-board" width="480" height="480"></canvas>

          <div class="controls">
            <button id="start-button" type="button">开始</button>
            <button id="pause-button" type="button">暂停</button>
            <button id="restart-button" type="button">重新开始</button>
          </div>

          <div class="status-bar">
            <span>耗时：<strong id="game-duration">0.0s</strong></span>
            <span>速度：<strong id="game-speed">180ms</strong></span>
          </div>

          <p class="hint">方向键或 W/A/S/D 控制移动，空格暂停，R 重新开始。</p>
          <div id="message-box" class="message-box" data-tone="info">点击“开始”进入游戏。</div>
        </section>

        <aside class="side-panel">
          <section class="panel-card">
            <div class="panel-head">
              <h2>提交成绩</h2>
              <p>游戏结束后可录入昵称并保存到排行榜。</p>
            </div>
            <form id="score-form" class="score-form">
              <label for="player-name">玩家昵称</label>
              <input id="player-name" name="playerName" type="text" maxlength="24" placeholder="例如：Arisa" required />
              <button id="submit-score" type="submit">提交本局成绩</button>
            </form>
          </section>

          <section class="panel-card">
            <div class="panel-head">
              <h2>排行榜</h2>
              <p>按分数降序、耗时升序排序。</p>
            </div>
            <ul id="leaderboard-list" class="leaderboard-list"></ul>
            <p id="leaderboard-empty" class="empty-state">还没有成绩记录，来成为第一个上榜的人。</p>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
